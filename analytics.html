<!DOCTYPE html>
<html>
<head>
<title>Expensify Analytics</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

<div class="sidebar">
<h2>Expensify</h2>
<ul>
<li onclick="location.href='index.html'">🏠 Dashboard</li>
<li onclick="location.href='transactions.html'">📜 Transactions</li>
<li class="active">📊 Analytics</li>
<li onclick="location.href='settings.html'">⚙️ Settings</li>
</ul>
</div>

<div class="main">

<h1>📊 Financial Analytics</h1>

<div class="dashboard-grid">

<div class="glass-box">
<h3>Income vs Expense</h3>
<canvas id="analysisChart"></canvas>
</div>

<div class="glass-box">
<h3>Category Spending</h3>
<canvas id="categoryChart"></canvas>
</div>
<div class="glass-box">
<h3>📄 Monthly Report</h3>
<p id="monthlyReport">Loading...</p>
</div>

</div>

</div>
</div>

<script src="script.js"></script>
<!-- ================= LOGOUT MODAL ================= -->

<div id="logoutModal" class="modal">
  <div class="modal-box">
    <h3>Confirm Logout</h3>
    <p style="opacity:.7;font-size:14px">
      Are you sure you want to logout?
    </p>

    <div class="modal-actions">
      <button onclick="confirmLogout()">Yes, Logout</button>
      <button onclick="closeLogoutModal()">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
